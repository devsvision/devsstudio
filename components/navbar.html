<header id="site-header" class="nav-shell fixed inset-x-0 top-0 z-40 px-4 py-3 lg:px-8">
  <div class="mx-auto max-w-7xl">
    <div class="nav-surface relative flex items-center justify-between gap-6 rounded-2xl border px-4 py-3 backdrop-blur-xl lg:px-5">
      <div class="pointer-events-none absolute inset-x-6 bottom-0 h-px bg-gradient-to-r from-transparent via-electric/50 to-transparent"></div>

      <a href="#home" data-route="home" class="group inline-flex items-center gap-3 text-white">
        <span class="relative inline-flex h-12 w-12 items-center justify-center overflow-hidden transition duration-300">
          <span class="absolute inset-0 rounded-full bg-electric/10 opacity-0 blur-xl transition duration-300 group-hover:opacity-100"></span>
          <img src="assets/logo/devs-logo.png" alt="DEVS Studio logo" class="relative h-11 w-11 object-cover object-center" width="44" height="44" />
        </span>
        <span class="flex items-center">
          <img src="assets/logo/devs-wordmark.png" alt="DEVS Studio" class="h-8 w-auto max-w-[150px] object-contain sm:h-9 sm:max-w-[170px]" width="170" height="43" />
        </span>
      </a>

      <div class="flex items-center gap-2 lg:gap-4">
        <nav class="hidden items-center gap-1 text-sm font-semibold text-slate-300 lg:flex" aria-label="Primary navigation">
          <a href="#home" data-route="home" class="nav-link" data-i18n="nav.home">Home</a>
          <a href="#about" data-route="about" class="nav-link" data-i18n="nav.about">About</a>
          <a href="#services" data-route="services" class="nav-link" data-i18n="nav.services">Services</a>
          <a href="#portfolio" data-route="portfolio" class="nav-link" data-i18n="nav.portfolio">Portfolio</a>
          <a href="#contact" data-route="contact" class="nav-link nav-link-cta" data-i18n="nav.contact">Contact</a>
        </nav>

        <div class="language-switcher relative">
          <button id="language-button" type="button" class="language-button" aria-haspopup="true" aria-expanded="false">
            <span class="language-flag flag-en" data-language-flag aria-hidden="true"></span>
            <span class="hidden text-xs font-bold uppercase tracking-[0.18em] text-slate-100 sm:inline" data-language-label>EN</span>
            <svg class="h-3.5 w-3.5 text-electric/85" viewBox="0 0 16 16" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M4 6l4 4 4-4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>

          <div id="language-menu" class="language-menu hidden" role="menu" aria-label="Language selection">
            <button type="button" class="language-option" data-language-option="en" role="menuitem">
              <span class="language-flag flag-en" aria-hidden="true"></span>
              <span>English</span>
            </button>
            <button type="button" class="language-option" data-language-option="id" role="menuitem">
              <span class="language-flag flag-id" aria-hidden="true"></span>
              <span>Bahasa Indonesia</span>
            </button>
          </div>
        </div>

        <button id="mobile-menu-button" type="button" aria-expanded="false" class="nav-toggle group inline-flex h-11 w-11 items-center justify-center rounded-xl border border-white/10 bg-white/[0.06] text-electric shadow-[0_0_30px_rgba(14,165,233,0.12)] transition duration-300 hover:border-electric/60 hover:bg-electric/10 lg:hidden">
          <span class="sr-only">Toggle navigation</span>
          <span class="relative h-5 w-5" aria-hidden="true">
            <span class="nav-toggle-line absolute left-0 top-1 block h-0.5 w-5 rounded-full bg-current transition duration-300"></span>
            <span class="nav-toggle-line absolute left-0 top-2.5 block h-0.5 w-5 rounded-full bg-current transition duration-300"></span>
            <span class="nav-toggle-line absolute left-0 top-4 block h-0.5 w-5 rounded-full bg-current transition duration-300"></span>
          </span>
        </button>
      </div>
    </div>

    <div id="mobile-menu" class="mobile-nav-panel mx-auto mt-3 hidden overflow-hidden rounded-2xl border border-white/10 bg-[#06101f]/92 p-2 shadow-soft backdrop-blur-3xl lg:hidden">
      <nav class="space-y-1 text-sm font-semibold text-slate-300" aria-label="Mobile navigation">
        <a href="#home" data-route="home" class="mobile-nav-link" data-i18n="nav.home">Home</a>
        <a href="#about" data-route="about" class="mobile-nav-link" data-i18n="nav.about">About</a>
        <a href="#services" data-route="services" class="mobile-nav-link" data-i18n="nav.services">Services</a>
        <a href="#portfolio" data-route="portfolio" class="mobile-nav-link" data-i18n="nav.portfolio">Portfolio</a>
        <a href="#contact" data-route="contact" class="mobile-nav-link" data-i18n="nav.contact">Contact</a>
      </nav>
    </div>
  </div>
</header>
